name: Check patch applies

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  check-systemd:
    runs-on: ubuntu-latest
    container:
      image: archlinux/archlinux:base-devel

    steps:
      - uses: actions/checkout@v6

      - name: Setup
        run: pacman -Sy --noconfirm git >/dev/null 2>&1

      - name: Clone upstream PKGBUILD repo
        run: |
          git clone --depth 1 \
            https://gitlab.archlinux.org/archlinux/packaging/packages/systemd.git \
            /tmp/upstream

      - name: Extract source via makepkg
        run: |
          cd /tmp/upstream
          useradd -m builder 2>/dev/null || true
          chown -R builder: /tmp/upstream
          # --nobuild exits non-zero by design (build not attempted)
          su builder -c 'makepkg --nobuild --nodeps --skippgpcheck 2>&1 | tail -30' \
            || true

      - name: Verify source extraction
        run: |
          HEADER=$(find /tmp/upstream/src/ -path '*/shared/user-record.h' 2>/dev/null | head -1)
          if [[ -z "$HEADER" ]]; then
            echo "::error::user-record.h not found — source extraction may have failed"
            find /tmp/upstream/ -maxdepth 3 -type d 2>/dev/null || true
            exit 1
          fi
          echo ":: Found header: $HEADER"

      - name: Check if age-verification code exists
        id: age-check
        run: |
          HEADER=$(find /tmp/upstream/src/ -path '*/shared/user-record.h' | head -1)
          if grep -q 'birth_date' "$HEADER"; then
            echo ":: Age-verification code present — patch needed"
            echo "needed=true" >> "$GITHUB_OUTPUT"
          else
            echo ":: Age-verification code not present — patch not needed yet"
            echo "needed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify patches apply cleanly
        if: steps.age-check.outputs.needed == 'true'
        run: |
          SRC_DIR=$(ls -d /tmp/upstream/src/systemd*/ 2>/dev/null | head -1)
          if [[ -z "$SRC_DIR" ]]; then
            echo "::error::systemd source directory not found"
            ls -la /tmp/upstream/src/ || true
            exit 1
          fi
          cd "$SRC_DIR"
          for p in "$GITHUB_WORKSPACE"/packages/systemd/patches/*.patch; do
            echo ":: Testing $(basename "$p")"
            patch -Np1 --dry-run < "$p"
          done
          echo ":: All patches apply cleanly"

  check-xdp:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Check PR #1922 status
        id: pr-status
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_JSON=$(gh api repos/flatpak/xdg-desktop-portal/pulls/1922)
          STATE=$(echo "$PR_JSON" | jq -r '.state')
          MERGED=$(echo "$PR_JSON" | jq -r '.merged')
          TITLE=$(echo "$PR_JSON" | jq -r '.title')

          echo ":: PR #1922: \"$TITLE\""
          echo "::   state=$STATE  merged=$MERGED"

          echo "state=$STATE"   >> "$GITHUB_OUTPUT"
          echo "merged=$MERGED" >> "$GITHUB_OUTPUT"

          if [[ "$MERGED" == "true" ]]; then
            echo "::warning::PR #1922 has been MERGED"
          fi

      - name: Check if ParentalControls code is in main branch
        id: main-check
        run: |
          HTTP_CODE=$(curl -s -o /dev/null -w '%{http_code}' \
            'https://raw.githubusercontent.com/flatpak/xdg-desktop-portal/main/src/parental-controls.c')

          if [[ "$HTTP_CODE" == "200" ]]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
            echo "::warning::parental-controls.c found in main — patch is now needed"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo ":: parental-controls.c not in main yet (HTTP $HTTP_CODE)"
          fi

      - name: Check Arch packaging for ParentalControls
        run: |
          git clone --depth 1 \
            https://gitlab.archlinux.org/archlinux/packaging/packages/xdg-desktop-portal.git \
            /tmp/xdp-pkg

          if grep -rq 'parental.controls\|ParentalControls' /tmp/xdp-pkg/; then
            echo "::warning::Arch xdg-desktop-portal package already references ParentalControls"
          else
            echo ":: Arch package does not reference ParentalControls yet"
          fi

      - name: Fail if patch needed but missing
        if: steps.main-check.outputs.found == 'true'
        run: |
          if [ ! -s packages/xdg-desktop-portal/patches/0001-remove-parental-controls.patch ]; then
            echo "::error::ParentalControls landed upstream but no patch exists in packages/xdg-desktop-portal/patches/"
            exit 1
          fi
          echo ":: Patch file exists"
